; PHP-FPM global configuration
; This file is used by both local Docker Compose and Railway deployments.

[global]
; Log to stderr so supervisor/Railway captures the output
error_log = /proc/self/fd/2
log_level = notice

[www]
; Listen on TCP so Nginx can reach PHP-FPM via 127.0.0.1:9000
listen = 127.0.0.1:9000

; Run as www-data (matches Nginx and file ownership)
user  = www-data
group = www-data

; CRITICAL for Railway (and any container platform):
; By default PHP-FPM clears the environment before starting worker processes,
; which means variables injected by Railway (MYSQLHOST, MYSQLUSER, etc.) are
; invisible to PHP scripts.  Setting clear_env = no passes the full process
; environment through to every PHP worker so getenv() works as expected.
clear_env = no

; Process manager settings
pm                   = dynamic
pm.max_children      = 5
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Send access/error logs to stdout/stderr for Railway log streaming
access.log  = /proc/self/fd/2
